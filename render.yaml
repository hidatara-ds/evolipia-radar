# Render.com deployment configuration
services:
  # API Server
  - type: web
    name: evolipia-radar-api
    env: go
    region: singapore
    plan: free
    buildCommand: go build -o api ./cmd/api
    startCommand: ./api
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 8080
      - key: WORKER_CRON
        value: "*/10 * * * *"
      - key: DATABASE_URL
        fromDatabase:
          name: evolipia-radar-db
          property: connectionString

  # Worker
  - type: worker
    name: evolipia-radar-worker
    env: go
    region: singapore
    plan: free
    buildCommand: go build -o worker ./cmd/worker
    startCommand: ./worker
    envVars:
      - key: WORKER_CRON
        value: "*/10 * * * *"
      - key: DATABASE_URL
        fromDatabase:
          name: evolipia-radar-db
          property: connectionString

# Database
databases:
  - name: evolipia-radar-db
    databaseName: radar
    user: postgres
    region: singapore
    plan: free
