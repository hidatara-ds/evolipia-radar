name: Scheduled News Scraper

on:
  schedule:
    # WIB (UTC+7): 07:00, 12:00, 19:00
    # UTC: 00:00, 05:00, 12:00
    - cron: '0 0 * * *'   # 07:00 WIB
    - cron: '0 5 * * *'   # 12:00 WIB
    - cron: '0 12 * * *'  # 19:00 WIB
  workflow_dispatch:  # Manual trigger dengan pilihan
    inputs:
      retention_cleanup:
        description: 'Run retention cleanup?'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      
      - name: Run Worker
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
          MAX_FETCH_BYTES: "2000000"
          FETCH_TIMEOUT_SECONDS: "8"
        run: |
          echo "========================================"
          echo "Worker started at: $(date)"
          echo "========================================"
          go run ./cmd/worker
          WORKER_EXIT=$?
          echo "========================================"
          echo "Worker finished at: $(date)"
          echo "Exit code: $WORKER_EXIT"
          echo "========================================"
          exit $WORKER_EXIT
      
      - name: Retention Cleanup (Optional)
        if: github.event.inputs.retention_cleanup == 'true'
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Running data retention cleanup..."
          psql "$DATABASE_URL" -c "SELECT cleanup_old_data();"
          echo "Cleanup completed"
