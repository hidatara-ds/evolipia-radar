name: PR Check

on:
  pull_request:
    branches: [ main, deploy-supabase ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Build Worker
        run: go build -o /tmp/worker ./cmd/worker
      - name: Vet
        run: go vet ./...
      - name: Test (if any)
        run: go test ./... || true
