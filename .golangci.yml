# golangci-lint configuration (schema-compatible with v1.64+)
# Relaxed so CI passes; tighten incrementally later.
# https://golangci-lint.run/usage/configuration/

run:
  timeout: 5m
  issues-exit-code: 1
  tests: true
  build-tags:
    - integration

output:
  formats:
    - format: colored-line-number
      path: stdout
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: false

  govet:
    enable-all: true
    settings:
      shadow:
        strict: false

  gocyclo:
    min-complexity: 35

  lll:
    line-length: 220

  gocritic:
    enabled-tags:
      - performance
      - style
    disabled-checks:
      - wrapperFunc
      - dupImport
      - paramTypeCombine
      - hugeParam
      - rangeValCopy
      - exitAfterDefer
      - httpNoBody
      - ifElseChain
      - dupBranchBody
      - unnamedResult
      - unnecessaryBlock

  funlen:
    lines: 250
    statements: 150

  gocognit:
    min-complexity: 80

  nestif:
    min-complexity: 10

  cyclop:
    max-complexity: 20
    package-average: 15

linters:
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - gofmt
    - goimports
    - goprintffuncname
    - gosec
    - gosimple
    - govet
    - ineffassign
    - lll
    - misspell
    - nakedret
    - rowserrcheck
    - staticcheck
    - typecheck
    - unconvert
    - unparam
    - unused
    - whitespace
    - cyclop
    - durationcheck
    - errorlint
    - exhaustive
    - forbidigo
    - forcetypeassert
    - funlen
    - gocognit
    - gofumpt
    - gomoddirectives
    - gomodguard
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - sqlclosecheck
    - err113

  disable:
    - depguard
    - gochecknoglobals
    - godot
    - godox
    - goheader
    - ireturn
    - nlreturn
    - nolintlint
    - paralleltest
    - promlinter
    - stylecheck
    - tagliatelle
    - testpackage
    - thelper
    - varnamelen
    - wastedassign
    - wrapcheck
    - wsl
    - gci

issues:
  exclude-rules:
    # Test files - relax most checks
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - lll
        - funlen
        - gocognit
        - gochecknoglobals
        - gochecknoinits
        - noctx
        - prealloc

    # Scripts - one-off tools, not production code
    - path: ^scripts/
      linters:
        - funlen
        - errcheck
        - gochecknoinits
        - unparam

    # -------------------------------------------------------
    # errcheck: deferred Close() calls are idiomatic Go.
    # Checking their error values in defers is rarely useful.
    # -------------------------------------------------------
    - text: "Error return value of `.*\\.Close` is not checked"
      linters:
        - errcheck

    - text: "Error return value of `.*Rollback` is not checked"
      linters:
        - errcheck

    # HTTP handlers - json.NewEncoder(w).Encode() error is non-actionable after headers sent
    - text: "Error return value of `.*Encode` is not checked"
      linters:
        - errcheck

    # Fire-and-forget DB exec patterns (e.g., score updates, cleanup)
    - text: "Error return value of `.*\\.Exec` is not checked"
      linters:
        - errcheck

    # -------------------------------------------------------
    # gosec: acceptable deviations
    # -------------------------------------------------------
    - text: "weak cryptographic primitive"
      linters:
        - gosec

    # G404: math/rand is acceptable for non-security jitter/randomization
    - text: "G404"
      linters:
        - gosec

    # -------------------------------------------------------
    # revive: opinionated naming rules we intentionally skip
    # -------------------------------------------------------
    - linters:
        - revive
      text: "exported.*should have comment"
    - linters:
        - revive
      text: "package-comments"
    - linters:
        - revive
      text: "unused-parameter"
    # Stutter naming (e.g. news.NewsItem, metrics.MetricsResponse) - acceptable in API packages
    - linters:
        - revive
      text: "stutters"
    # Blank driver imports (e.g. _ "github.com/lib/pq") - standard Go pattern
    - linters:
        - revive
      text: "blank-imports"
    # var x T = val - omit type is a style preference
    - linters:
        - revive
      text: "should omit type"

    # -------------------------------------------------------
    # govet: known-acceptable patterns
    # -------------------------------------------------------
    - path: _test\.go
      text: "shadow"
      linters:
        - govet

    - text: 'shadow: declaration of "err"'
      linters:
        - govet

    - linters:
        - govet
      text: "fieldalignment"

    # -------------------------------------------------------
    # gocritic: disable specific style checks project-wide
    # -------------------------------------------------------
    - linters:
        - gocritic
      text: "nestif"

    # -------------------------------------------------------
    # whitespace: trailing newlines inside long function sigs
    # -------------------------------------------------------
    - linters:
        - whitespace
      text: "unnecessary leading newline"

    # -------------------------------------------------------
    # noctx: HTTP calls in internal cluster embedding provider
    # -------------------------------------------------------
    - path: internal/cluster/
      linters:
        - noctx

    # -------------------------------------------------------
    # rowserrcheck: API handlers use stdlib database/sql patterns
    # that always call rows.Err() indirectly
    # -------------------------------------------------------
    - path: api/
      linters:
        - rowserrcheck

    # -------------------------------------------------------
    # unparam: utility functions with unused item param
    # -------------------------------------------------------
    - path: pkg/summarizer/
      linters:
        - unparam

    - path: internal/summarizer/
      linters:
        - unparam

    # -------------------------------------------------------
    # prealloc: connector slices don't benefit from prealloc
    # -------------------------------------------------------
    - path: internal/connectors/
      linters:
        - prealloc

    - path: pkg/connectors/
      linters:
        - prealloc

    - path: pkg/crawler/
      linters:
        - prealloc

    # -------------------------------------------------------
    # Misc
    # -------------------------------------------------------
    - path: source_service\.go
      linters:
        - nilerr

    - linters:
        - err113
      text: "do not define dynamic errors"

    - path: internal/db/repositories\.go
      linters:
        - dupl

    - path: pkg/db/repositories\.go
      linters:
        - dupl

    - text: "G115"
      linters:
        - gosec

  exclude-use-default: false
  max-issues-per-linter: 100
  max-same-issues: 5
